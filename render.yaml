# One-click deploy to Render's free tier. Push this repo to GitHub, then
# "New > Blueprint" on render.com and point it here. Set the `sync: false`
# secrets (SITREP_AGENT_SECRET, LLM_API_KEY, DATABASE_URL) in the dashboard.
#
# IMPORTANT for SitRep Ledger: set DATABASE_URL to a free hosted Postgres
# (Neon/Supabase) — the ledger's value compounds across meetings, and Render's
# free filesystem is wiped on restart, so SQLite would lose history.
# Also set PUBLIC_URL to this service's URL so dashboard links resolve.
services:
  - type: web
    name: sitrep-ledger
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SITREP_AGENT_SECRET
        sync: false
      - key: PUBLIC_URL
        sync: false          # set to your https://<service>.onrender.com URL
      - key: DATABASE_URL
        sync: false          # postgresql+asyncpg://... (Neon/Supabase free tier)
      - key: LLM_BASE_URL
        value: https://api.groq.com/openai/v1
      - key: LLM_API_KEY
        sync: false          # your Groq key (gsk_...)
      - key: MODEL
        value: llama-3.3-70b-versatile
